<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1F5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A3A8F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5821E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9F40;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="85" fill="url(#navyGrad)" filter="url(#shadow)"/>

  <!-- Bird/Udaan wings - stylized flying bird -->
  <!-- Left wing -->
  <path d="M100 95 Q65 70 30 80 Q55 88 75 100 Z" fill="url(#orangeGrad)"/>
  <!-- Right wing -->
  <path d="M100 95 Q135 70 170 80 Q145 88 125 100 Z" fill="url(#orangeGrad)"/>
  <!-- Body -->
  <ellipse cx="100" cy="100" rx="14" ry="9" fill="white"/>
  <!-- Head -->
  <circle cx="113" cy="95" r="7" fill="white"/>
  <!-- Beak -->
  <polygon points="120,94 128,96 120,98" fill="url(#orangeGrad)"/>
  <!-- Eye -->
  <circle cx="115" cy="94" r="2" fill="#0A1F5C"/>
  <!-- Tail feathers -->
  <path d="M86 102 Q75 112 70 120 Q82 110 90 105 Z" fill="url(#orangeGrad)"/>
  <path d="M84 104 Q72 118 65 128 Q79 115 88 107 Z" fill="#FF9F40" opacity="0.7"/>

  <!-- Star accent -->
  <polygon points="100,18 103,27 113,27 105,33 108,42 100,36 92,42 95,33 87,27 97,27" fill="url(#orangeGrad)" opacity="0.9"/>

  <!-- Institute Name -->
  <text x="200" y="80" font-family="Georgia, serif" font-size="46" font-weight="bold" fill="#0A1F5C" letter-spacing="2">UDAAN</text>
  <text x="200" y="112" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#F5821E" letter-spacing="6">INSTITUTE</text>

  <!-- Divider line -->
  <rect x="200" y="122" width="280" height="2.5" fill="url(#orangeGrad)" rx="1"/>

  <!-- Tagline -->
  <text x="200" y="148" font-family="Georgia, serif" font-size="13" fill="#1A3A8F" font-style="italic" letter-spacing="1">Uchhi Udaan, Ujjwal Bhavishya</text>

  <!-- Bottom text removed per request -->
</svg>
