<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coaching LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --secondary: #7c3aed; }
        body { font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .hero { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; padding: 80px 0; }
        .course-card { transition: transform 0.2s; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .course-card:hover { transform: translateY(-5px); }
        .btn-primary { background: var(--primary); border: none; }
        .btn-primary:hover { background: var(--secondary); }
        #authModal .modal-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .tab-active { border-bottom: 3px solid var(--primary); color: var(--primary); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="#"><i class="fas fa-graduation-cap me-2"></i>Coaching LMS</a>
        <div class="ms-auto d-flex gap-2">
            <span id="studentName" class="text-white me-3 d-none align-self-center"></span>
            <button class="btn btn-light" id="loginBtn" onclick="showAuth('login')">Login</button>
            <button class="btn btn-outline-light" id="registerBtn" onclick="showAuth('register')">Register</button>
            <button class="btn btn-danger d-none" id="logoutBtn" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section class="hero text-center">
    <div class="container">
        <h1 class="display-4 fw-bold">Apni Coaching Online Shuru Karo</h1>
        <p class="lead mt-3">Best courses, live tests aur results - sab ek jagah</p>
        <button class="btn btn-light btn-lg mt-3" onclick="scrollToCourses()">Courses Dekho</button>
    </div>
</section>

<!-- Courses Section -->
<section class="py-5" id="coursesSection">
    <div class="container">
        <h2 class="fw-bold mb-4 text-center">Available Courses</h2>
        <div class="row g-4" id="coursesList">
            <div class="text-center"><div class="spinner-border text-primary"></div></div>
        </div>
    </div>
</section>

<!-- Dashboard Section (after login) -->
<section class="py-5 bg-light d-none" id="dashboardSection">
    <div class="container">
        <h2 class="fw-bold mb-4">Mera Dashboard</h2>
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item"><a class="nav-link active" onclick="showTab('enrolledCourses', this)">Enrolled Courses</a></li>
            <li class="nav-item"><a class="nav-link" onclick="showTab('myResults', this)">Meri Results</a></li>
            <li class="nav-item"><a class="nav-link" onclick="showTab('paymentHistory', this)">Payment History</a></li>
        </ul>
        <div id="enrolledCourses"></div>
        <div id="myResults" class="d-none"></div>
        <div id="paymentHistory" class="d-none"></div>
    </div>
</section>

<!-- Auth Modal -->
<div class="modal fade" id="authModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="authTitle">Login</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <!-- Login Form -->
                <div id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="loginEmail" placeholder="email@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="loginPassword" placeholder="Password">
                    </div>
                    <button class="btn btn-primary w-100" onclick="doLogin()">Login Karo</button>
                    <p class="text-center mt-3">Account nahi hai? <a href="#" onclick="showAuth('register')">Register karo</a></p>
                </div>
                <!-- Register Form -->
                <div id="registerForm" class="d-none">
                    <div class="mb-3">
                        <label class="form-label">Naam</label>
                        <input type="text" class="form-control" id="regName" placeholder="Tumhara naam">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="email@example.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" id="regPhone" placeholder="Mobile number">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="regPassword" placeholder="Strong password">
                    </div>
                    <button class="btn btn-primary w-100" onclick="doRegister()">Register Karo</button>
                    <p class="text-center mt-3">Pehle se account hai? <a href="#" onclick="showAuth('login')">Login karo</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Payment Modal -->
<div class="modal fade" id="payModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Course Purchase</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body text-center p-4">
                <i class="fas fa-lock fa-3x text-primary mb-3"></i>
                <h4 id="payCourseName"></h4>
                <h2 class="text-success mt-2">₹<span id="payAmount"></span></h2>
                <button class="btn btn-success btn-lg mt-3 w-100" onclick="initiatePayment()">
                    <i class="fas fa-credit-card me-2"></i>Abhi Pay Karo
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
